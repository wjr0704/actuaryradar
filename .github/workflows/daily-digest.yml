name: Daily ActuaryRadar Refresh

on:
  schedule:
    # GitHub cron is UTC. Paris 08:00 is 06:00 UTC in summer and 07:00 UTC in winter.
    # The workflow guards on Europe/Paris local hour so only the correct run updates content.
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-actuaryradar-refresh
  cancel-in-progress: false

jobs:
  build-daily-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve Europe/Paris refresh window
        id: paris_time
        run: |
          echo "date=$(TZ=Europe/Paris date +%F)" >> "$GITHUB_OUTPUT"
          echo "hour=$(TZ=Europe/Paris date +%H)" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(TZ=Europe/Paris date --iso-8601=seconds)" >> "$GITHUB_OUTPUT"

      - name: Skip non-08:00 Paris scheduled run
        if: github.event_name == 'schedule' && steps.paris_time.outputs.hour != '08'
        run: |
          echo "Skipping because Europe/Paris local hour is ${{ steps.paris_time.outputs.hour }}, not 08."

      - name: Generate today's digest
        if: github.event_name != 'schedule' || steps.paris_time.outputs.hour == '08'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PERPLEXITY_MODEL: ${{ vars.PERPLEXITY_MODEL }}
          AI_MAX_ITEMS: ${{ vars.AI_MAX_ITEMS }}
          AI_MIN_ZH_ITEMS: ${{ vars.AI_MIN_ZH_ITEMS }}
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ] && [ -z "${PERPLEXITY_API_KEY:-}" ]; then
            echo "Missing AI provider key. Set OPENAI_API_KEY or PERPLEXITY_API_KEY in GitHub repository secrets."
            exit 1
          fi
          MODEL_ARG=""
          if [ -n "${OPENAI_MODEL:-}" ]; then
            MODEL_ARG="--ai-model ${OPENAI_MODEL}"
          elif [ -n "${PERPLEXITY_MODEL:-}" ]; then
            MODEL_ARG="--ai-model ${PERPLEXITY_MODEL}"
          fi
          python work/actuary_digest_mvp/src/digest.py --date "${{ steps.paris_time.outputs.date }}" --ai-provider auto ${MODEL_ARG} --ai-max-items "${AI_MAX_ITEMS:-8}" --ai-min-zh-items "${AI_MIN_ZH_ITEMS:-2}"

      - name: Build static site
        if: github.event_name != 'schedule' || steps.paris_time.outputs.hour == '08'
        run: |
          python work/actuary_digest_mvp/src/build_site.py --base-url https://insuranceactuaryhub.com

      - name: Publish digest to tracked UI data
        if: github.event_name != 'schedule' || steps.paris_time.outputs.hour == '08'
        run: |
          mkdir -p work/actuary_digest_mvp/ui/data
          cp "outputs/insurance_actuary_digest_${{ steps.paris_time.outputs.date }}.json" work/actuary_digest_mvp/ui/data/digest.json

      - name: Verify refreshed site data
        if: github.event_name != 'schedule' || steps.paris_time.outputs.hour == '08'
        env:
          AI_MIN_ZH_ITEMS: ${{ vars.AI_MIN_ZH_ITEMS }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import sys

          expected = "${{ steps.paris_time.outputs.date }}"
          min_zh = int(os.environ.get("AI_MIN_ZH_ITEMS") or "2")
          paths = [
              pathlib.Path("outputs/actuary_radar_site/data/digest.json"),
              pathlib.Path("work/actuary_digest_mvp/ui/data/digest.json"),
          ]

          for path in paths:
              data = json.loads(path.read_text())
              items = data.get("items", [])
              actual = data.get("report_date")
              ai = data.get("refresh_log", {}).get("ai", {})
              source_grounded = sum(
                  1
                  for item in items
                  if item.get("ai_enriched")
                  and (item.get("enrichment_basis") or item.get("summary_basis")) == "article_text"
              )
              source_grounded_zh = sum(
                  1
                  for item in items
                  if item.get("ai_enriched")
                  and (item.get("enrichment_basis") or item.get("summary_basis")) == "article_text"
                  and (item.get("source_language") or item.get("original_language") or "").lower().startswith("zh")
              )
              ai_zh = sum(
                  1
                  for item in items
                  if item.get("ai_enriched")
                  and (item.get("source_language") or item.get("original_language") or "").lower().startswith("zh")
              )
              print(f"{path}: Expected={expected} Actual={actual} Items={len(items)} SourceGroundedAI={source_grounded} SourceGroundedZH={source_grounded_zh} AIZH={ai_zh} AI={ai}")
              if actual != expected or not items or source_grounded <= 0 or ai_zh < min_zh:
                  sys.exit(1)
          PY

      - name: Commit updated reports
        if: github.event_name != 'schedule' || steps.paris_time.outputs.hour == '08'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update ActuaryRadar daily intelligence for ${{ steps.paris_time.outputs.date }}"
          file_pattern: |
            work/actuary_digest_mvp/ui/data
            outputs/actuary_radar_site
            outputs/insurance_actuary_digest_*.json
            outputs/insurance_actuary_digest_*.html
            outputs/insurance_actuary_digest_*.md
