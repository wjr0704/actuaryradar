[build]
  publish = "outputs/actuary_radar_site"
  command = "python3 work/actuary_digest_mvp/src/digest.py && python3 work/actuary_digest_mvp/src/build_site.py --base-url https://insuranceactuaryhub.com"
  functions = "work/actuary_digest_mvp/netlify/functions"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/.netlify/functions/daily-refresh"
  [headers.values]
    Cache-Control = "public, max-age=300, s-maxage=1800"
